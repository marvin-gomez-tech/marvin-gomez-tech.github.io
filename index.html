  <!-- ───────────────────────────────────────────────────────────────────────
       TikTok domain verification (META-TAG METHOD)
       When TikTok's "Verify URL" screen offers the meta-tag option, copy the
       content value it gives you and replace REPLACE_WITH_TIKTOK_CODE below,
       then commit + push and click Verify. (If TikTok instead gives you a .txt
       file, drop that file in this folder's root and push — either method works.)
  ──────────────────────────────────────────────────────────────────────────── -->
  <meta name="tiktok-developers-site-verification" content="REPLACE_WITH_TIKTOK_CODE">
